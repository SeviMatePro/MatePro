<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>MatePro - Subiectul I</title>
    
    <!-- 1. Stilul KaTeX (OBLIGATORIU) -->
    <link rel="stylesheet" href="https://jsdelivr.net">
    
    <!-- 2. Scripturile KaTeX (OBLIGATORIU) -->
    <script defer src="https://jsdelivr.net"></script>
    <script defer src="https://jsdelivr.net" 
        onload="renderMathInElement(document.body, {delimiters: [{left: '$$', right: '$$', display: true}, {left: '\\(', right: '\\)', display: false}]});">
    </script>
</head>
<body style="font-family: sans-serif; padding: 20px; background: #f0fdf4; color: #1f2937; margin: 0;">

    <div style="max-width: 800px; margin: 0 auto;">
        <h2 style="color: #166534; border-bottom: 2px solid #bbf7d0; padding-bottom: 10px;">Subiectul I - MatePro</h2>
        
        <!-- TEST LATEX: Acum se va vedea desenat corect -->
        <div style="background: #dcfce7; padding: 10px; border-radius: 8px; margin-bottom: 20px;">
            <strong>Test LaTeX:</strong> $$\sqrt{144} = 12$$
        </div>

        <div id="status" style="margin-bottom: 20px; font-style: italic; color: #666;">Se generează testul din baza de date SQL...</div>
        
        <div id="exercitii-container"></div>
    </div>

    <script>
        // AICI vom pune codul de legătură cu NEON SQL în pasul următor
        async function genereazaSubiect() {
            const container = document.getElementById('exercitii-container');
            const status = document.getElementById('status');
            
            // Momentan afișăm un mesaj până legăm API-ul de la Neon
            status.innerText = "Sistemul KaTeX este gata. Urmează conectarea la SQL.";
        }

        function verifica(buton, corect, ales) {
            const parinte = buton.parentElement;
            const card = parinte.parentElement;
            const butoane = parinte.querySelectorAll('button');
            
            butoane.forEach(b => b.disabled = true);
            
            if (ales.toLowerCase() === corect.toLowerCase()) {
                buton.style.borderColor = "#22c55e"; 
                buton.style.backgroundColor = "#f0fdf4";
                card.style.borderColor = "#22c55e"; 
            } else {
                buton.style.borderColor = "#ef4444"; 
                buton.style.backgroundColor = "#fef2f2";
                card.style.borderColor = "#ef4444"; 
            }
        }

        // Pornim procesul la încărcare
        window.onload = function() {
            genereazaSubiect();
        };
    </script>
</body>
</html>
